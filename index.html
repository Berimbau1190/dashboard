<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styleDashBoard.css">
  <title>Dashboard / gastos pessoais</title>

</head>
<body>
  <header>Dashboard Offline</header>

  <div class="form">
    <h3>Carteira</h3>
    <span>Valor atual: <span id="carteiraDisplay">R$ 0,00</span></span>
    <button class="btn-editar" onclick="editarCarteira()">Editar Carteira</button>
  </div>

  <div class="form">
    <h3>Adicionar Renda Extra</h3>
    <input type="text" id="nomeRenda" placeholder="Nome da renda" />
    <input type="number" id="valorRenda" placeholder="Valor da renda" />
    <button onclick="adicionarRenda()">Adicionar Renda</button>
  </div>

  <div class="form">
    <h3>Adicionar Métrica (Gasto)</h3>
    <input type="text" id="nomeGasto" placeholder="Nome do gasto" />
    <input type="number" id="valorGasto" placeholder="Valor do gasto" />
    <button onclick="adicionarGasto()">Adicionar Gasto</button>
  </div>

  <div class="container">
    <div class="card">
      <h3>Rendas Extras</h3>
      <ul id="listaRendas"></ul>
    </div>
    <div class="card">
      <h3>Métricas (Gastos)</h3>
      <ul id="listaMetricas"></ul>
    </div>
    <div class="card">
      <h3>Gráfico dos Gastos</h3>
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <!-- ADIÇÃO: Nova seção de gastos pendentes -->
  <div class="form" id="gastosPendentesContainer">
    <h3>Gastos Pendentes</h3>
    <ul id="listaGastosPendentes"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js" ></script>
</body>
</html>
